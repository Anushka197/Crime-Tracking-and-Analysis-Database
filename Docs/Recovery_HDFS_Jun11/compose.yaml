name: crime-intelligence-system

services:
  # --- RELATIONAL DATABASE ---
  db:
    image: postgres:16-alpine
    container_name: crime-intelligence-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - crime-intelligence-postgres-data:/var/lib/postgresql/data
      # Note the lowercase updated folder path
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- BIG DATA COMPONENTS ---
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: crime-hadoop-namenode
    hostname: namenode

    environment:
      CLUSTER_NAME: crime-cluster
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000

    ports:
      - "9870:9870"
      - "9000:9000"

    volumes:
      - hadoop-namenode-data:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: crime-hadoop-datanode
    hostname: datanode

    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: "namenode:9870"

    volumes:
      - hadoop-datanode-data:/hadoop/dfs/data

    depends_on:
      - namenode

volumes:
  crime-intelligence-postgres-data:
  hadoop-namenode-data:
  hadoop-datanode-data: